<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Profile | Prescription Connect
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body onload="loadProfile()">

<!-- NAVBAR -->

<div class="navbar">

    <div class="nav-brand">

        <div class="logo">
            👤
        </div>

        <div>

            <h1 class="brand-title">
                Profile Settings
            </h1>

            <p class="brand-subtitle">
                Manage Your Account
            </p>

        </div>

    </div>

    <div class="nav-links">

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="medications.html">
            Medications
        </a>

        <a href="reminders.html">
            Reminders
        </a>

        <button class="logout-btn"
                onclick="logout()">

            Logout

        </button>

    </div>

</div>

<!-- MAIN -->

<div class="dashboard-container">

    <!-- PROFILE CARD -->

    <div class="card">

        <h1 class="section-title">
            Personal Information
        </h1>

        <div class="input-group">

            <label>
                Full Name
            </label>

            <input type="text"
                   id="fullName">

        </div>

        <div class="input-group">

            <label>
                Email Address
            </label>

            <input type="email"
                   id="email"
                   disabled>

        </div>

        <div class="input-group">

            <label>
                Phone Number
            </label>

            <input type="text"
                   id="phone">

        </div>

        <button class="btn"
                onclick="updateProfile()">

            Update Profile

        </button>

    </div>

    <!-- SETTINGS -->

    <div class="card">

        <h1 class="section-title">
            Preferences
        </h1>

        <div class="medication-item">

            <h3>
                Email Notifications
            </h3>

            <p>
                Receive reminder emails for medications.
            </p>

        </div>

        <div class="medication-item"
             style="margin-top:20px;">

            <h3>
                Refill Alerts
            </h3>

            <p>
                Notify when medication stock is low.
            </p>

        </div>

        <div class="medication-item"
             style="margin-top:20px;">

            <h3>
                Theme Preference
            </h3>

            <p>
                Dark / Light / Dim themes enabled.
            </p>

        </div>

        <button class="btn"
                style="margin-top:25px;">

            Save Preferences

        </button>

    </div>

</div>

<script src="js/toast.js"></script>

<script>

    function logout(){

        localStorage.clear();

        window.location.href =
            "index.html";
    }

</script>

<div id="toastContainer"></div>
<script src="js/profile.js"></script>

</body>

</html>
