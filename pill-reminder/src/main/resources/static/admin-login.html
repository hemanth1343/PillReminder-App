<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Admin Login
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            🔐 Admin Portal
        </h1>

        <p class="subtitle">

            Secure administrator access

        </p>

        <div class="input-group">

            <label class="input-label">
                Admin Email
            </label>

            <input type="email"
                   id="email"
                   placeholder="Enter admin email">

        </div>

        <div class="input-group">

            <label class="input-label">
                Password
            </label>

            <input type="password"
                   id="password"
                   placeholder="Enter password">

        </div>

        <button onclick="adminLogin()">

            Login as Admin

        </button>

        <div class="bottom-text">

            User Login?

            <a href="index.html">

                Click Here

            </a>

        </div>

    </div>

</div>

<script src="js/admin-auth.js"></script>

</body>

</html>
