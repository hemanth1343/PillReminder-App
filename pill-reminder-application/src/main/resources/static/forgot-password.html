<!DOCTYPE html>
<html>

<head>

    <title>
        Forgot Password
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            Forgot Password
        </h1>
			
			<div class="input-group">
			          <label class="input-label">Email Address</label>
			          <input type="email" id="email" placeholder="Enter your email">
			      </div>

        <button
             class="otp-btn"
            onclick="sendOtp()">

            Send OTP

        </button>

			<div class="input-group">
							            <label class="input-label">OTP</label>
							            <input type="text" id="otp" placeholder="Enter your OTP">
							      </div>

        <button
            class="otp-btn"
            onclick="verifyOtp()">

            Verify OTP

        </button>

		
			<div class="input-group">
					            <label class="input-label">Password</label>
					            <input type="password" id="newPassword" placeholder="Enter your Password">
					      </div>
					

        <button
            class="otp-btn"
            onclick="resetPassword()">

            Reset Password

        </button>
		
		<p>

		            Remembered Password?

		            <a href="index.html">

		                Login

		            </a>

		        </p>

    </div>

</div>

<div id="toastContainer"></div>

<script src="js/toast.js"></script>

<script src="js/forgot-password.js"></script>

</body>

</html>
