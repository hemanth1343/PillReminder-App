<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Medications | Prescription Connect
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body onload="checkLogin(); loadMedications()">

<!-- NAVBAR -->
<div class="navbar">

	<div
	       class="nav-brand"
	       style="
	           display:flex;
	           align-items:center;
	           gap:20px;
	       ">

		<div
		           style="
		               position:relative;
		           ">

		           <img
		               id="profilePreview"
		               src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
		               alt="Profile"
		               style="
		                   width:90px;
		                   height:90px;
		                   border-radius:50%;
		                   object-fit:cover;
		                   border:4px solid #7c4dff;
		                   cursor:pointer;
		                   box-shadow:0 0 20px rgba(124,77,255,0.5);
		               ">
		</div>
		

        <div>

            <h1 class="brand-title">
                Prescription Connect
            </h1>

            <p class="brand-subtitle">
                Smart Medication Management
            </p>

        </div>

    </div>

    <div class="nav-links">
		
		<a href="medicine-search.html">
		    🔎 Medicine Search
		</a>

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="reminders.html">
            Reminders
        </a>


        <a href="profile.html">
            Profile
        </a>
		
		<button class="emergency-btn"
		        onclick="handleEmergency()">

		    Emergency

		</button>


        

    </div>

</div>

<!-- MAIN CONTENT -->

<div class="dashboard-container">

    <!-- LEFT CARD -->

    <div class="card">

        <h1 class="card-title">
            Add Medication
        </h1>

        <div class="input-grid">

            <div class="input-group">

                <label>
                    Medication Name <a href="medicine-search.html"
					style="margin-left:280px; text-decoration:none;">
				   		                 🔎
							   		</a>
                </label>
				
									   
                <input type="text"
                       id="name"
                       placeholder="Paracetamol">
					   

            </div>

            <div class="input-group">

                <label>
                    Dosage
                </label>

                <input type="text"
                       id="dosage"
                       placeholder="500mg">

            </div>

        </div>

        <div class="input-grid">

            <div class="input-group">

                <label>
                    Quantity
                </label>
                <input type="hidden"
                       id="medicationId">

                <input type="number"
                       id="quantity"
                       placeholder="30">

            </div>

            <div class="input-group">

                <label>
                    Refill Threshold
                </label>

                <input type="number"
                       id="refillThreshold"
                       placeholder="5">

            </div>

        </div>

        <div class="input-group">

            <label>
                Instructions
            </label>

            <input type="text"
                   id="instructions"
                   placeholder="After food">

        </div>

        <div class="input-grid">

            <div class="input-group">

                <label>
                    Frequency
                </label>

                <select id="frequency">

                    <option value="DAILY">
                        Daily
                    </option>

                    <option value="WEEKLY">
                        Weekly
                    </option>

                    <option value="MONTHLY">
                        Monthly
                    </option>

                </select>

            </div>

            <div class="input-group">

                <label>
                    Reminder Times
                </label>

                <input type="text"
                       id="scheduledTimes">
            </div>

        </div>

        <div class="input-grid">

            <div class="input-group">

                <label>
                    Start Date
                </label>

                <input type="date"
                       id="startDate">

            </div>

            <div class="input-group">

                <label>
                    End Date
                </label>

                <input type="date"
                       id="endDate">

            </div>

        </div>

        <button class="btn"
                id="submitBtn"
                onclick="addMedication()">

            Add Medication

        </button>

    </div>

    <!-- RIGHT CARD -->

    <div class="card">

        <h1 class="section-title">
            Your Medications
        </h1>

        <ul id="list"
            class="medication-list">

        </ul>

    </div>

</div>

<!-- SCRIPTS -->

<script src="js/api.js"></script>

<script src="js/medication.js"></script>
<script src="js/profile-image.js"></script>
<script>

    function checkLogin() {

        const token =
            localStorage.getItem("token");

        if(!token){

            window.location.href =
                "index.html";
        }
    }


</script>

<script>

    function setTheme(theme){

        document.body.classList.remove(
            "dark-theme",
            "light-theme",
            "dim-theme"
        );

        document.body.classList.add(
            theme + "-theme"
        );

        localStorage.setItem(
            "theme",
            theme
        );

        document.querySelectorAll(
            ".theme-btn"
        ).forEach(btn => {

            btn.classList.remove(
                "active"
            );
        });

        document.getElementById(
            theme + "Btn"
        ).classList.add(
            "active"
        );
    }

    function loadTheme(){

        const savedTheme =
            localStorage.getItem("theme")
            || "dark";

        setTheme(savedTheme);
    }

    loadTheme();

</script>
<div id="toastContainer"></div>

<script src="js/theme.js"></script>

<script src="js/toast.js"></script>
<script>
window.addEventListener("load", () => {

    const image =
        localStorage.getItem(
            "profileImage"
        );

    if(image){

        document.getElementById(
            "profilePreview"
        ).src = image;
    }
});
</script>

</body>

</html>
