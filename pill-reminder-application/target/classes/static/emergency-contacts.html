<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Emergency Contacts
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

	<div class="container">

	    <div class="card">

    <h1 class="section-title">

        🚨 Emergency Contacts

    </h1>
		   
		   <div class="input-group">
		              <label class="input-label">Parent / Guide Name</label>
		              <input type="text" id="contactName1" placeholder="Parent / Guide Name">
		          </div>

		   <div class="input-group">
		   	              <label class="input-label">Email Address</label>
		   	              <input type="email" id="contactEmail1" placeholder="Email Address">
		   	          </div>


		   <div class="input-group">
		   		              <label class="input-label">Second Contact Name</label>
		   		              <input type="text" id="contactName2" placeholder="Second Contact Name">
		   		          </div>

		   <div class="input-group">
		   	   	              <label class="input-label">Email Address</label>
		   	   	              <input type="email" id="contactEmail2" placeholder="Email Address">
		   	   	          </div>

		   <button class="otp-btn" onclick="saveEmergencyContacts()">
		       Save Contacts
		   </button>
		   
		  

</div>
</div>
<script>


	window.onload = function(){

	    const contacts =
	        JSON.parse(
	            localStorage.getItem(
	                "emergencyContacts"
	            )
	        );

	    if(
	        contacts &&
	        contacts.length >= 2
	    ){

	        window.location.href =
	            "medications.html";
	    }
	};

	// ====================================
	// BLOCK BACK BUTTON UNTIL SAVED
	// ====================================

	if(
	    localStorage.getItem(
	        "emergencySaved"
	    ) !== "true"
	){

	    window.history.pushState(
	        null,
	        null,
	        window.location.href
	    );

	    window.onpopstate = function(){

	        alert(

	            "Emergency Contacts Required\n\n" +

	            "Please add at least 2 emergency contacts before leaving this page."

	        );

	        window.history.pushState(
	            null,
	            null,
	            window.location.href
	        );
	    };
	}

function saveEmergencyContacts(){

    const contacts = [

        {
            name:
                document.getElementById(
                    "contactName1"
                ).value,

            email:
                document.getElementById(
                    "contactEmail1"
                ).value
        },

        {
            name:
                document.getElementById(
                    "contactName2"
                ).value,

            email:
                document.getElementById(
                    "contactEmail2"
                ).value
        }
    ];

    if(

        !contacts[0].email ||

        !contacts[1].email

    ){

        alert(
			"Emergency Contacts Required\n\n" +

			 "Please add at least 2 emergency contacts before using the Emergency Alert feature."
        );

        return;
    }

    localStorage.setItem(

        "emergencyContacts",

        JSON.stringify(contacts)
    );

    alert(
        "Emergency Contacts Saved"
    );

    window.location.href =
        "medications.html";
}

</script>

<script src="js/medication.js"></script>

</body>

</html>
