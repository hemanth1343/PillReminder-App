<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Emergency Contacts
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="card"
     style="max-width:700px;margin:40px auto;">

    <h1 class="section-title">

        🚨 Emergency Contacts

    </h1>

    <input type="text"
           id="contactName1"
           placeholder="Parent / Guide Name">

    <input type="email"
           id="contactEmail1"
           placeholder="Email Address">

    <input type="text"
           id="contactName2"
           placeholder="Second Contact Name">

    <input type="email"
           id="contactEmail2"
           placeholder="Email Address">

		   <button onclick="saveEmergencyContacts()">
		       Save Contacts
		   </button>

</div>

<script>

function saveEmergencyContacts(){

    const contacts = [

        {
            name:
                document.getElementById(
                    "contactName1"
                ).value,

            email:
                document.getElementById(
                    "contactEmail1"
                ).value
        },

        {
            name:
                document.getElementById(
                    "contactName2"
                ).value,

            email:
                document.getElementById(
                    "contactEmail2"
                ).value
        }
    ];

    if(

        !contacts[0].email ||

        !contacts[1].email

    ){

        alert(
            "Please Add Minimum 2 Emergency Emails"
        );

        return;
    }

    localStorage.setItem(

        "emergencyContacts",

        JSON.stringify(contacts)
    );

    alert(
        "Emergency Contacts Saved"
    );

    window.location.href =
        "medications.html";
}

</script>

<script src="js/medication.js"></script>

</body>

</html>
