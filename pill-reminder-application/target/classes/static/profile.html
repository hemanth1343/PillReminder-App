<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Profile | Prescription Connect
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <!-- LEFT -->

    <div
        class="nav-brand"
        style="
            display:flex;
            align-items:center;
            gap:20px;
        ">

        <!-- PROFILE IMAGE -->

        <div
            style="
                position:relative;
            ">

            <img
                id="profilePreview"
                src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                alt="Profile"
                onclick="openImageOptions()"
                style="
                    width:90px;
                    height:90px;
                    border-radius:50%;
                    object-fit:cover;
                    border:4px solid #7c4dff;
                    cursor:pointer;
                    box-shadow:0 0 20px rgba(124,77,255,0.5);
                ">

            <!-- CAMERA ICON -->

            <div
                onclick="openImageOptions()"
                style="
                    position:absolute;
                    bottom:0;
                    right:0;
                    background:#7c4dff;
                    width:30px;
                    height:30px;
                    border-radius:50%;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    color:white;
                    cursor:pointer;
                    font-size:16px;
                    border:2px solid white;
                ">

                📷

            </div>

        </div>

        <!-- HIDDEN INPUTS -->

        <input
            type="file"
            id="galleryInput"
            accept="image/*"
            onchange="previewProfileImage(event)"
            hidden>

        

        <!-- TITLE -->

        <div>

            <h1 class="brand-title">
                Profile Settings
            </h1>

            <p class="brand-subtitle">
                Manage Your Account
            </p>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="nav-links">

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="medications.html">
            Medications
        </a>

        <a href="reminders.html">
            Reminders
        </a>

        <button class="emergency-btn"
                onclick="handleEmergency()">

            Emergency

        </button>

        <button class="logout-btn"
                onclick="logout()">

            Logout

        </button>

    </div>

</div>

<!-- MAIN -->

<div class="dashboard-container">

    <!-- PROFILE CARD -->

    <div class="card">

        <h1 class="section-title">
            Personal Information
        </h1>

        <div class="input-group">

            <label>
                Full Name
            </label>

            <input type="text"
                   id="fullName">

        </div>

        <div class="input-group">

            <label>
                Email Address
            </label>

            <input type="email" 
                   id="email"
                   disabled>

        </div>

        <div class="input-group">

            <label>
                Phone Number
            </label>

            <input type="text"
                   id="phone">

        </div>

        <button class="otp-btn"
                onclick="updateProfile()">

            Update Profile

        </button>
		<br>
		<br>
		<h1> Change Password?</h1>
		<button
		    class="otp-btn"
		    onclick="openPasswordModal()">

		     Change Password

		</button>
		

    </div>

    <!-- SETTINGS -->

    <div class="card">

        <h1 class="section-title">
            Preferences
        </h1>

        <!-- EMAIL -->

        <div class="medication-item">

            <div
                style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                "
            >

                <div>

                    <h3>
                        Email Notifications
                    </h3>

                    <p>
                        Receive reminder emails for medications.
                    </p>

                </div>

                <label class="switch">

                    <input
                        type="checkbox"
                        id="emailNotifications"
                    >

                    <span class="slider"></span>

                </label>

            </div>

        </div>

        <!-- PUSH -->

        <div class="medication-item"
             style="margin-top:20px;">

            <div
                style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                "
            >

                <div>

                    <h3>
                        Refill Alerts
                    </h3>

                    <p>
                        Notify when medication stock is low.
                    </p>

                </div>

                <label class="switch">

                    <input
                        type="checkbox"
                        id="pushNotifications"
                    >

                    <span class="slider"></span>

                </label>

            </div>

        </div>

        <!-- THEME -->

        <div class="medication-item"
             style="margin-top:20px;">

            <h3>
                Theme Preference
            </h3>

            <select
                id="theme"
               
				class="otp-btn"
                style="
                    margin-top:15px;
                    width:100%;
                "
            >

                <option style="color: black;" value="dark">
                    Dark
                </option>

                <option style="color: black;" value="light">
                    Light
                </option>

                <option style="color: black;" value="dim">
                    Dim
                </option>

            </select>

        </div>

        <button class="btn"
                style="margin-top:25px;"
                onclick="savePreferences()">

            Save Preferences

        </button>

    </div>

</div>

<!-- IMAGE OPTION MODAL -->

<div
    id="imageModal"
    style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.6);
        display:none;
        align-items:center;
        justify-content:center;
        z-index:9999;
    "
>

    <div
        style="
            background:#1e1e2f;
            padding:30px;
            border-radius:20px;
            width:300px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
        "
    >

        <h2 style="margin-bottom:25px;color:white;">
            Profile Photo
        </h2>

        <button
            class="btn"
            onclick="openGallery()"
            style="margin-bottom:15px;"
        >

            Upload Image

        </button>

		<button
		    class="btn"
		    onclick="startCamera()"
		    style="
		        margin-bottom:15px;
		        background:#22c55e;
		    "
		>

		    Take Photo

		</button>
		<video
		    id="camera"
		    autoplay
		    playsinline
		    style="
		        width:100%;
		        border-radius:15px;
		        margin-top:15px;
		        display:none;
		    "
		></video>

		<canvas
		    id="cameraCanvas"
		    style="display:none;"
		></canvas>

		<button
		    id="captureBtn"
		    class="btn"
		    onclick="capturePhoto()"
		    style="
		        display:none;
		        margin-top:15px;
		        background:#7c4dff;
		    "
		>

		    Capture

		</button>

        <button
            class="btn"
            onclick="closeImageModal()"
            style="background:#ef4444;"
        >

            Cancel

        </button>

    </div>

</div>

<!-- TOAST -->

<div id="toastContainer"></div>

<!-- SCRIPTS -->

<script src="js/toast.js"></script>

<script src="js/medication.js"></script>

<script src="js/profile.js"></script>

<script src="js/theme.js"></script>

<script>

    function logout(){

        localStorage.clear();

        window.location.href =
            "index.html";
    }

</script>

</body>

<div
    id="passwordModal"
    class="modal">

    <div class="modal-content">

        <span
            class="close"
            onclick="closePasswordModal()">

            &times;

        </span>

        <h2>
            Change Password
        </h2>
		
		

		<button
				    class="otp-btn"
				    onclick="sendPasswordOtp()">

				     Send OTP

				</button>

				<div class="input-group">

						            <label>
						               OTP
						            </label>

						            <input type="text"
						                   id="passwordOtp"
						                   placeholder="Enter OTP">

						        </div>

						<button
						    class="otp-btn"
						    onclick="verifyPasswordOtp()">

						     Verify OTP

						</button>
						<div class="input-group">

								            <label>
								               New Password
								            </label>

								            <input type="password"
								                   id="newPassword"
								                   placeholder="New Password">

								        </div>

						<button
						class="otp-btn"
						    onclick="changePassword()">

						    Change Password

						</button>

    </div>

</div>

</html>
